[workspace]
resolver = "2"
members = [
  "egui-anim",
  "grezi",
  "tree-sitter-ntbib",
]

[profile.dev.package."*"]
opt-level = 3

[profile.dev]
panic = "abort"

[profile.release]
lto = true
codegen-units = 1
strip = true
panic = "abort"

[workspace.dependencies]
egui_extras = { version = "0.29.1", features = ["all_loaders"] }
egui = { version = "0.29.1", features = ["deadlock_detection"] }
ecolor = { version = "0.29.1" }
eframe = { version = "0.29.1", default-features = false }
