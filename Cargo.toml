[workspace]
resolver = "2"
members = [
  "egui-anim",
  "grezi",
  "tree-sitter-grz",
  "tree-sitter-ntbib",
]

[profile.dev.package."*"]
opt-level = 3

[profile.dev]
panic = "abort"

[profile.release]
lto = true
codegen-units = 1
strip = true
panic = "abort"

[workspace.dependencies]
egui_extras = {  path = "../egui/crates/egui_extras", features = ["all_loaders"] }
ecolor = {  path = "../egui/crates/ecolor" }
eframe = {  path = "../egui/crates/eframe", default-features = false }

