[package]
name = "grezi"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
ahash = "0.8.3"
cassowary = "0.3.0"
keyframe = { version = "1.1.1", default-features = false, features = ["alloc"] }
num_enum = "0.7.0"
serde = { version = "1.0.188", features = ["derive"] }
postcard = { version = "1.0.8", features = ["use-std"] }
log = "0.4.20"

# native:
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
clap = { version = "4.4.6", features = ["derive"] }
miette = { version = "5.10.0", features = ["fancy"] }
pulldown-cmark = { version = "0.9.3", default-features = false }
tree-sitter = "0.20.10"
tree-sitter-grz = { version = "0.0.1", path = "../tree-sitter-grz" }
helix-core = { git = "https://github.com/helix-editor/helix", version = "0.6.0", rev = "7f5940b" }
helix-loader = { git = "https://github.com/helix-editor/helix", version = "0.6.0", rev = "7f5940b" }
helix-term = { git = "https://github.com/helix-editor/helix", version = "0.6.0", rev = "7f5940b" }
helix-view = { git = "https://github.com/helix-editor/helix", version = "0.6.0", rev = "7f5940b" }
helix-lsp = { git = "https://github.com/helix-editor/helix", version = "0.6.0", rev = "7f5940b" }
ropey = "1.6.0"
eframe = { version = "0.22.0", default-features = false, features = [
    "default_fonts",
    "glow",
    "wayland",
    "persistence",
] }
lsp-server = "0.7.4"
lsp-types = "0.94.1"
serde_json = "1.0.107"
notify = "6.1.1"
env_logger = "0.10"
thiserror = "1.0.48"

# web:
[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.2.10", features = ["js"] }
eframe = { version = "0.22.0", default-features = false, features = [
    "default_fonts",
    "glow",
    "persistence",
] }
wasm-bindgen-futures = "0.4"

[build-dependencies]
tree-sitter-grz = { version = "0.0.1", path = "../tree-sitter-grz" }
case = "1.0.0"

[profile.dev.package."*"]
opt-level = 3

[profile.dev]
panic = "abort"

[profile.release]
lto = true
codegen-units = 1
strip = true
panic = "abort"
